syntax = "proto3";
package axiom_agent_messages;
option go_package = "axiom-official/axiom-agent-messages/gen";

// AgentRequest is the top-level input to the Axiom agent and all sub-flows.
// It carries the user's goal plus the runtime credentials needed by agent nodes.
message AgentRequest {
  // Natural language description of what to build / fix / refactor.
  string goal = 1;
  // Target language for generated code: "python" | "go".
  string language = 2;
  // GitHub OAuth access token (fetched at runtime via GET /app/github/token).
  // Used by Publisher nodes to create repos and push code on the user's behalf.
  string github_token = 3;
  // The caller's Axiom API key — used by agent nodes to call BFF endpoints.
  string axiom_api_key = 4;
  // Base URL of the Axiom registry (e.g. "http://localhost:8082").
  string registry_url = 5;
  // Base URL of the Axiom BFF (e.g. "http://localhost:8083").
  string bff_url = 6;
  // Populated by IntentRouter: build_package | design_flow | debug_package |
  // refactor_package | debug_flow | refactor_flow
  string intent = 7;
}

// NodeSpec describes a single node implementation within a package.
message NodeSpec {
  string name = 1;
  // Protobuf message name for the input type (as defined in messages.proto).
  string input_message = 2;
  // Protobuf message name for the output type.
  string output_message = 3;
  // "unary" (single request → single response) or "pipeline" (streaming output).
  string node_type = 4;
  // Human-readable description of what this node does.
  string description = 5;
  // Full source code of the node implementation file (e.g. nodes/my_node.py).
  string source_code = 6;
  // Full source code of the corresponding unit test file.
  string test_code = 7;
  // Names of secrets this node requires (declared in axiom.yaml required_secrets).
  repeated string required_secrets = 8;
}

// PackageBuildContext is the single message that flows through the entire
// package build pipeline. Each stage enriches it with its own outputs so that
// all context is available to every downstream node, including on loop-back
// iterations from PackageErrorAnalyser back to CodeGenerator.
message PackageBuildContext {
  // ── Design fields (IntentClassifier / PackageDesigner) ───────────────────
  // Scoped package name, e.g. "axiom-official/my-package".
  string name = 1;
  string version = 2;
  // "python" | "go"
  string language = 3;
  // All nodes in this package (NodeSpec.source_code and test_code populated by CodeGenerator).
  repeated NodeSpec nodes = 4;
  // Scoped package names this package imports.
  repeated string imports = 5;
  // Full content of messages/messages.proto.
  string proto_content = 6;
  // Full content of axiom.yaml.
  string axiom_yaml = 7;
  // Full content of requirements.txt (Python packages only).
  string requirements_txt = 8;

  // ── Publish fields (Publisher) ────────────────────────────────────────────
  // GitHub repo URL (set after repo creation and code push).
  string repo_url = 9;
  // Git commit SHA of the pushed code.
  string commit_hash = 10;
  bool publish_success = 11;
  string publish_error = 12;
  // ULIDs of the published nodes returned by the registry.
  repeated string node_ids = 13;

  // ── Test fields (PackageTester) ───────────────────────────────────────────
  bool test_success = 14;
  string test_error = 15;
  // Execution ID from the ingress (used to query debug events).
  string execution_id = 16;
  // Debug session ID for the debug event stream.
  string session_id = 17;
  // Secrets absent at test time — code is correct but can't be validated yet.
  repeated string missing_secrets = 18;

  // ── Analysis fields (PackageErrorAnalyser) ────────────────────────────────
  // true triggers the loop back-edge to CodeGenerator (max 3 iterations).
  bool has_error = 19;
  // Detailed fix instructions for CodeGenerator on retry iterations.
  string fix_instructions = 20;
  // Plain-English error summary for user display.
  string error_summary = 21;
  // Number of fix iterations attempted so far.
  int32 iteration = 22;
}

// FlowBuildContext is the single message that flows through the entire flow
// build and refactor pipelines. Each stage enriches it with its own outputs
// so that the graph JSON is available for reassembly on loop-back iterations.
message FlowBuildContext {
  // ── Design fields (FlowIntentClassifier / NodeResolver / GraphAssembler) ──
  // Human-readable name for the flow.
  string name = 1;
  string description = 2;
  // Serialised sourceGraphRequest JSON (format accepted by POST /app/graphs/compile).
  string graph_json = 3;
  // Set by FlowRefactorClassifier when refactoring an existing flow.
  string existing_graph_id = 4;

  // ── Compile fields (FlowCompiler) ─────────────────────────────────────────
  bool compile_success = 5;
  // Blobstore artifact ID of the compiled flow.
  string artifact_id = 6;
  string compile_error = 7;

  // ── Test fields (FlowTestInvoker) ─────────────────────────────────────────
  bool test_success = 8;
  string test_error = 9;
  // Execution ID from the ingress (used to query debug events).
  string execution_id = 10;
  // Debug session ID for the debug event stream.
  string session_id = 11;
  // Decoded JSON output from the terminal node (if successful).
  string output_json = 12;
  // Secrets absent at test time.
  repeated string missing_secrets = 13;

  // ── Analysis fields (FlowErrorAnalyser / FlowRefactorAnalyser) ────────────
  // true triggers the loop back-edge to GraphAssembler (max 3 iterations).
  bool has_error = 14;
  // Detailed fix instructions for GraphAssembler on retry iterations.
  string fix_instructions = 15;
  // Plain-English error summary for user display.
  string error_summary = 16;
  // Number of fix iterations attempted so far.
  int32 iteration = 17;
}

// AgentProgress is emitted by terminal nodes and StreamStatusToUser.
message AgentProgress {
  // Current stage: "designing" | "generating" | "publishing" | "testing" |
  //                "debugging" | "complete" | "error"
  string stage = 1;
  // Human-readable status message to display to the user.
  string message = 2;
  // true when the agent has finished (success or failure).
  bool complete = 3;
  bool success = 4;
  // The blobstore artifact ID when a flow has been successfully compiled.
  string artifact_id = 5;
  // The published package name when a package has been successfully published.
  string package_name = 6;
}
